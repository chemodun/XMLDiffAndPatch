version: 2
updates:
  # General npm dependency updates (weekly)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    versioning-strategy: increase        # or widen / lockfile-only
    rebase-strategy: auto
    allow:
      - dependency-type: "direct"
      - dependency-type: "production"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    labels:
      - deps
      - npm
    assignees:
      - chemodun
    reviewers:
      - chemodun
    groups:                              # (feature still rolling out)
      types:
        patterns:
          - "@types/*"

  # Daily security-only npm updates (minimal noise in main stream)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "05:00"
      timezone: "UTC"
    security-updates-only: true
    labels:
      - deps
      - security

  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "04:30"
      timezone: "UTC"
    labels:
      - deps
      - ci